<!DOCTYPE html>
<html>
<head>
    <title>Book Appointment | SQMS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
    <div class="logo">🏥 SQMS</div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/appointment">Appointment</a>
        <a href="/track">Track Queue</a>
        <a href="/logout">Logout</a>
        <a href="javascript:history.back()" class="back-btn">← Back</a>
    </div>
</nav>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, message in messages %}
    <div class="flash flash-{{ category }}">{{ message }}</div>
  {% endfor %}
{% endwith %}

<div class="card">
    <h2>Book Appointment</h2>
    <p style="text-align:center; margin-bottom:20px; color:#64748b;">
        Welcome, {{ session.user_name }}
    </p>
    <form method="POST">
        <input type="text" name="hospital"   placeholder="Hospital Name"  required>
        <input type="text" name="department" placeholder="Department"     required>
        <input type="text" name="doctor"     placeholder="Doctor Name"    required>
        <input type="date" name="date"                                     required>
        <input type="text" name="slot"       placeholder="Time Slot (e.g. 10:00 AM)" required>
        <button type="submit">Confirm Appointment</button>
    </form>
</div>

<footer>
    <p>© 2026 Smart Healthcare Queue Management System</p>
</footer>
</body>
</html>
